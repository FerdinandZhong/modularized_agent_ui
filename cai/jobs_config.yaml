# Agent Workflow UI — CML Job Chain
#
# Default runtime (Python 3.11 standard, no GPU):
#   docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-jupyterlab-python3.11-standard:2026.01.1-b6
#
# Sequence:
#   1. git_sync          – pull latest code from GitHub into the CML project
#   2. setup_environment – install Node.js, npm ci, npm run build, compile nginx
#
# After both jobs succeed the GitHub Actions workflow restarts the CML Application
# (cai/launch_app.py), which starts the Next.js standalone server + nginx.

jobs:
  git_sync:
    name: "Git Repository Sync"
    script: ".git_sync.py"
    parent_job_key: null
    timeout: 300       # < 2 min normally
    cpu: 1
    memory: 4
    description: "Pull latest code from GitHub into the CML project"

  setup_environment:
    name: "Setup Environment"
    script: "cai/setup_environment.py"
    parent_job_key: "git_sync"
    timeout: 1800      # Node install + npm ci + npm run build
    cpu: 4
    memory: 8
    description: "Install Node.js, build Next.js standalone output"

application:
  name: "Agent Workflow UI"
  subdomain: "agent-ui"
  description: "Modularized Agent Workflow UI"
  script: "cai/launch_app.py"
  cpu: 2
  memory: 4
