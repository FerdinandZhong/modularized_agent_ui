application:
  name: "agent-workflow-ui"
  subdomain: "agent-ui"
  description: "Modularized Agent Workflow UI — connects to any CAI Agent Studio workflow"
  script: "cai/launch_app.py"

resources:
  cpu: 2
  memory: 4  # GB

runtime:
  identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-jupyterlab-python3.11-standard:2026.01.1-b6"

environment:
  NEXT_TELEMETRY_DISABLED: "1"
  NODE_VERSION: "20"
  # Set these in CML Application environment or as project environment variables:
  # WORKFLOW_BACKEND_URL: "https://your-workflow-backend.ml.example.cloudera.site"
  # WORKFLOW_API_KEY: "<your-api-key>"
