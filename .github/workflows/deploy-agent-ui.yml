name: Deploy Agent Workflow UI to CML

on:
  workflow_dispatch:
    inputs:
      runtime_identifier:
        description: 'CML ML Runtime identifier'
        required: true
        default: 'docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-jupyterlab-python3.11-standard:2026.01.1-b6'
        type: string
      force_rebuild:
        description: 'Force rebuild (rerun all jobs even if already succeeded)'
        required: false
        default: false
        type: boolean

jobs:
  # ── 1. Get or create the CML project ─────────────────────────────────────
  setup-project:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      project_id: ${{ steps.setup.outputs.project_id }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: { python-version: '3.11' }
      - run: pip install -q requests pyyaml

      - name: Setup CML Project
        id: setup
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python cai/setup_project.py
          echo "project_id=$(cat /tmp/project_id.txt)" >> $GITHUB_OUTPUT

      - name: Summary
        if: always()
        run: |
          echo "## Setup Project — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "Project ID: \`${{ steps.setup.outputs.project_id }}\`" >> $GITHUB_STEP_SUMMARY

  # ── 2. Create / update jobs and Application ───────────────────────────────
  create-jobs:
    needs: setup-project
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: { python-version: '3.11' }
      - run: pip install -q requests pyyaml

      - name: Create / update CML Jobs and Application
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
          RUNTIME_IDENTIFIER: ${{ github.event.inputs.runtime_identifier }}
          WORKFLOW_BACKEND_URL: ${{ secrets.WORKFLOW_BACKEND_URL }}
          WORKFLOW_API_KEY: ${{ secrets.WORKFLOW_API_KEY }}
        run: python cai/create_jobs.py --project-id ${{ needs.setup-project.outputs.project_id }}

      - name: Summary
        if: always()
        run: |
          echo "## Create Jobs — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ── 3. Git sync ───────────────────────────────────────────────────────────
  trigger-git-sync:
    needs: [setup-project, create-jobs]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: { python-version: '3.11' }
      - run: pip install -q requests pyyaml

      - name: Trigger Git Repository Sync
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
        run: |
          python cai/trigger_jobs.py \
            --project-id ${{ needs.setup-project.outputs.project_id }} \
            --jobs-config cai/jobs_config.yaml \
            --job-key git_sync

      - name: Summary
        if: always()
        run: |
          echo "## Git Sync — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ── 4. Setup environment (install Node, build Next.js, compile nginx) ─────
  trigger-setup-env:
    needs: [setup-project, trigger-git-sync]
    runs-on: ubuntu-latest
    timeout-minutes: 90    # Node install + npm ci + build + nginx compile

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: { python-version: '3.11' }
      - run: pip install -q requests pyyaml

      - name: Trigger Setup Environment
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
        run: |
          python cai/trigger_jobs.py \
            --project-id ${{ needs.setup-project.outputs.project_id }} \
            --jobs-config cai/jobs_config.yaml \
            --job-key setup_environment

      - name: Summary
        if: always()
        run: |
          echo "## Setup Environment — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ── 5. Restart Application ────────────────────────────────────────────────
  restart-application:
    needs: [setup-project, trigger-setup-env]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: { python-version: '3.11' }
      - run: pip install -q requests pyyaml

      - name: Restart CML Application
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
        run: |
          python cai/trigger_jobs.py \
            --project-id ${{ needs.setup-project.outputs.project_id }} \
            --jobs-config cai/jobs_config.yaml \
            --restart-app

      - name: Summary
        if: always()
        run: |
          echo "## Restart Application — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Force Rebuild | ${{ github.event.inputs.force_rebuild || 'false' }} |" >> $GITHUB_STEP_SUMMARY
