<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0a0a0f"/>
  <!-- Agent network: three nodes + connecting lines -->
  <!-- Lines (drawn first so nodes sit on top) -->
  <line x1="16" y1="10" x2="9"  y2="22" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="16" y1="10" x2="23" y2="22" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="9"  y1="22" x2="23" y2="22" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Nodes -->
  <circle cx="16" cy="10" r="3.2" fill="#3b82f6"/>
  <circle cx="9"  cy="22" r="2.5" fill="#3b82f6" opacity="0.75"/>
  <circle cx="23" cy="22" r="2.5" fill="#3b82f6" opacity="0.75"/>
</svg>
